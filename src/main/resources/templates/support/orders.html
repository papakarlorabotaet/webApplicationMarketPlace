<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление товарами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .goods-img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">MarketPlace | Admin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/support/profile">Профиль</a></li>
                <li class="nav-item"><a class="nav-link active" href="/support/orders">Товары</a></li>
                <li class="nav-item"><a class="nav-link" href="/support/questions">Вопросы</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Модерация новых товаров</h5>
            <span class="badge bg-light text-primary" th:text="${pendingGoodsCount}">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Продавец</th>
                        <th>Название товара</th>
                        <th>Цена</th>
                        <th>Описание</th>
                        <th class="text-end">Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${pendingGoods}">
                        <td>
                            <div th:text="${item.getSellerName()}">Продавец</div>
                            <small class="text-muted" th:text="${item.getSellerEmail()}"></small>
                        </td>
                        <td><strong th:text="${item.name}">Товар</strong></td>
                        <td th:text="${item.price} + ' ₽'">0</td>
                        <td>
                            <small class="text-truncate d-inline-block" style="max-width: 200px;" th:text="${item.description}"></small>
                        </td>
                        <td class="text-end px-3">
                            <div class="d-flex justify-content-end gap-2">
                                <form th:action="@{/support/approve/{id}(id=${item.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-success btn-sm">Одобрить</button>
                                </form>

                                <form th:action="@{/support/reject/{id}(id=${item.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-danger btn-sm">Отклонить</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pendingGoods)}">
                        <td colspan="5" class="text-center py-4 text-muted">Нет товаров, ожидающих проверки.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
