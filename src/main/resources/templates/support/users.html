<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">MarketPlace Admin</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/support/profile">Профиль</a>
            <a class="nav-link" href="/support/orders">Модерация</a>
            <a class="nav-link active" href="/users">Пользователи</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Список пользователей системы</h2>
        <span class="badge bg-primary" th:text="'Всего: ' + ${users.size()}"></span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Имя Фамилия</th>
                    <th>Email</th>
                    <th>Роли</th>
                    <th>Город</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.name} + ' ' + ${u.surname}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span th:each="role : ${u.roles}"
                              th:text="${role.name}"
                              th:classappend="${role.name == 'ROLE_SUPPORT' ? 'badge bg-danger me-1' :
                                               (role.name == 'ROLE_SELLER' ? 'badge bg-success me-1' : 'badge bg-info me-1')}">
                        </span>
                    </td>
                    <td th:text="${u.city}"></td>
                    <td>
                        <form th:action="@{/deleteUser}" method="get" onsubmit="return confirm('Вы уверены?');">
                            <input type="hidden" name="userEmail" th:value="${u.email}">
                            <button class="btn btn-outline-danger btn-sm">Удалить</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
