<div class="container mt-4">
    <h3>Мои товары</h3>
    <div class="row">
        <div class="col-md-4" th:each="product : ${sellerGoods}">
            <div class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}"></h5>
                    <p class="card-text">Статус:
                        <span th:classappend="${product.moderationStatus.name() == 'APPROVED' ? 'text-success' : 'text-warning'}"
                              th:text="${product.moderationStatus}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <a href="/list/add" class="btn btn-primary">Добавить новый товар</a>
</div>
