<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Мои сообщения | MarketPlace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .chat-list-item { cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .chat-list-item:hover { background-color: #f8f9fa; }
        .chat-list-item.active { background-color: #e9ecef; border-left-color: #0d6efd; }
        .message-preview { font-size: 0.9rem; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body class="bg-light">

<!-- Общая навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">MARKETPLACE</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/list}">КАТАЛОГ</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/messages}">СООБЩЕНИЯ</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}">ВЫХОД</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Ваши диалоги</h5>
                </div>

                <div class="list-group list-group-flush">
                    <!-- Цикл по сообщениям/диалогам -->
                    <div th:each="msg : ${messages}" class="list-group-item chat-list-item p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="mb-1 fw-bold" th:text="${msg.senderEmail == #authentication.name ? 'Вы -> ' + msg.recipientEmail : msg.senderEmail}">Собеседник</h6>
                            <small class="text-muted" th:text="${#temporals.format(msg.timestamp, 'dd.MM HH:mm')}">12.03 15:00</small>
                        </div>
                        <p class="message-preview mb-0" th:text="${msg.content}">Текст последнего сообщения...</p>
                    </div>

                    <!-- Если сообщений нет -->
                    <div th:if="${#lists.isEmpty(messages)}" class="p-5 text-center">
                        <p class="text-muted">У вас пока нет активных переписок.</p>
                        <a th:href="@{/list}" class="btn btn-primary btn-sm">Перейти в каталог</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
