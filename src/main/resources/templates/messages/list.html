<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Сообщения</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .chat-box { height: 400px; overflow-y: scroll; border: 1px solid #dee2e6; padding: 15px; background: white; }
        .msg-in { text-align: left; color: blue; }
        .msg-out { text-align: right; color: green; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">MarketPlace</a>
        <a class="nav-link text-white" href="/list">Вернуться в каталог</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="chat-box mb-3" id="chat">
                <div th:each="msg : ${messages}" th:class="${msg.sender.email == #authentication.name ? 'msg-out' : 'msg-in'}">
                    <strong th:text="${msg.sender.name}"></strong>:
                    <span th:text="${msg.content}"></span>
                    <br><small class="text-muted" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></small>
                    <hr>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="messageInput" class="form-control" placeholder="Введите сообщение...">
                <button class="btn btn-primary" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>
</div>

</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    var stompClient = null;
    var currentUserEmail = [[${#authentication.name}]]; // получаем email текущего юзера

    // В реальном проекте тут должен быть ID того, с кем открыт чат
    // Для примера возьмем из параметров или скрытого поля
    var activeReceiverId = 1;

    function connect() {
        var socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);

            // Подписываемся на личные сообщения
            stompClient.subscribe('/user/queue/messages', function (messageOutput) {
                showMessage(JSON.parse(messageOutput.body));
            });
        });
    }

    function sendMessage() {
        var messageContent = document.getElementById('messageInput').value;
        if (messageContent && stompClient) {
            var chatMessage = {
                receiverId: activeReceiverId,
                content: messageContent
            };

            // Отправляем на контроллер
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));

            // Отображаем у себя
            showMyMessage(messageContent);
            document.getElementById('messageInput').value = '';
        }
    }

    function showMessage(message) {
        var chat = document.getElementById('chat');
        var messageElement = document.createElement('div');
        messageElement.className = 'msg-in';
        messageElement.innerHTML = '<strong>' + message.sender.name + '</strong>: ' + message.content + '<hr>';
        chat.appendChild(messageElement);
        chat.scrollTop = chat.scrollHeight;
    }

    function showMyMessage(content) {
        var chat = document.getElementById('chat');
        var messageElement = document.createElement('div');
        messageElement.className = 'msg-out';
        messageElement.innerHTML = '<strong>Вы</strong>: ' + content + '<hr>';
        chat.appendChild(messageElement);
        chat.scrollTop = chat.scrollHeight;
    }

    // Запускаем подключение при загрузке
    connect();
</script>
</html>
