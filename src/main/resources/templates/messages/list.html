<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Мои сообщения | MarketPlace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .chat-list-item { cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .chat-list-item:hover { background-color: #f8f9fa; }
        .chat-list-item.active { background-color: #e9ecef; border-left-color: #0d6efd; }
        .message-preview { font-size: 0.9rem; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-bg { background-color: #f0f7ff !important; } /* Легкий голубой фон */
        .unread-text { font-weight: 800 !important; color: #000; } /* Жирный текст */
    </style>
</head>
<body class="bg-light">

<!-- Общая навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">MARKETPLACE</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/list}">КАТАЛОГ</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/messages}">СООБЩЕНИЯ</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}">ВЫХОД</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="container-fluid px-4">
            <div class="row" style="height: 80vh;">
                <div class="col-md-4 col-lg-3 border-end bg-white overflow-auto p-0">
                    <div class="list-group list-group-flush">
                        <a th:each="msg : ${messages}"
                           th:href="@{/messages/chat/{id}(id=${msg.sender.email == #authentication.name ? msg.receiver.id : msg.sender.id})}"
                           class="list-group-item list-group-item-action p-3 chat-list-item"
                           th:classappend="${companion != null && (msg.sender.id == companion.id || msg.receiver.id == companion.id)} ? 'active' : ''">

                            <div class="d-flex justify-content-between">
                                <strong th:classappend="${!msg.isRead && msg.receiver.email == #authentication.name} ? 'text-primary' : ''"
                                        th:text="${msg.sender.email == #authentication.name ? msg.receiver.name : msg.sender.name}">Имя</strong>
                                <small class="text-muted" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></small>
                            </div>
                            <div class="message-preview small text-muted" th:text="${msg.content}"></div>
                        </a>
                    </div>
                </div>

                <div class="col-md-8 col-lg-9 d-flex flex-column bg-white">
                    <div th:if="${companion != null}" class="h-100 d-flex flex-column">
                        <div class="p-3 border-bottom shadow-sm">
                            <h5 class="mb-0" th:text="'Чат с ' + ${companion.name}">Чат</h5>
                        </div>

                        <div class="flex-grow-1 overflow-auto p-4 bg-light" id="chatWindow">
                            <div th:each="m : ${chatHistory}" class="mb-3 d-flex"
                                 th:classappend="${m.sender.email == #authentication.name} ? 'justify-content-end' : 'justify-content-start'">
                                <div class="p-3 rounded shadow-sm"
                                     th:style="${m.sender.email == #authentication.name} ? 'max-width: 70%; background-color: #dcf8c6;' : 'max-width: 70%; background-color: #fff;'">
                                    <div th:text="${m.content}"></div>
                                    <small class="text-muted d-block text-end" style="font-size: 0.7rem;"
                                           th:text="${#temporals.format(m.timestamp, 'HH:mm')}"></small>
                                </div>
                            </div>
                        </div>

                        <div class="p-3 border-top">
                            <form th:action="@{/messages/send}" method="post" class="d-flex">
                                <input type="hidden" name="receiverId" th:value="${companion.id}">
                                <input type="text" name="content" class="form-control me-2" placeholder="Введите сообщение..." required autocomplete="off">
                                <button type="submit" class="btn btn-primary">Отправить</button>
                            </form>
                        </div>
                    </div>

                    <div th:unless="${companion != null}" class="m-auto text-center text-muted">
                        <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
                        <p>Выберите диалог, чтобы начать общение</p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Автопрокрутка чата вниз при загрузке
            var objDiv = document.getElementById("chatWindow");
            if(objDiv) objDiv.scrollTop = objDiv.scrollHeight;
        </script>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
