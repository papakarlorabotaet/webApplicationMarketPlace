<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .goods-img{
            width:80px;
            height:60px;
            object-fit:cover;
            border-radius:6px;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">

        <a class="navbar-brand" href="/">MarketPlace</a>

        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/list">Каталог</a>
            <a class="nav-link active" href="/cart">Корзина</a>
        </div>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/messages">Сообщения</a>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>

    </div>
</nav>


<main class="container">

    <div class="card shadow-sm">

        <div class="card-header bg-white">
            <h4 class="mb-0">🛒 Ваша корзина</h4>
        </div>


        <div class="card-body p-0">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">
                <tr>
                    <th>Товар</th>
                    <th>Цена</th>
                    <th>Количество</th>
                    <th>Сумма</th>
                    <th class="text-end">Действие</th>
                </tr>
                </thead>

                <tbody>

                <!-- товары -->

                <tr th:each="item : ${cart.items}">

                    <!-- товар -->

                    <td>
                        <div class="d-flex align-items-center">

                            <img
                                    th:src="${item.goods.imagePath != null ?
                                    '/uploads/' + item.goods.imagePath :
                                    'https://via.placeholder.com/80x60'}"
                                    class="goods-img me-3"
                                    alt="goods">

                            <div>
                                <strong th:text="${item.goods.name}">
                                    Название товара
                                </strong>

                                <div class="text-muted small"
                                     th:text="${item.goods.description}">
                                    описание
                                </div>
                            </div>

                        </div>
                    </td>


                    <!-- цена -->

                    <td>
                        <span th:text="${item.goods.price}"></span> ₽
                    </td>


                    <!-- количество -->

                    <td th:text="${item.quantity}">
                        1
                    </td>


                    <!-- сумма -->

                    <td>
                        <strong>
                            <span th:text="${item.goods.price * item.quantity}"></span> ₽
                        </strong>
                    </td>


                    <!-- удалить -->

                    <td class="text-end">

                        <form th:action="@{/cart/remove}" method="post">

                            <input type="hidden"
                                   name="itemId"
                                   th:value="${item.id}">

                            <button class="btn btn-outline-danger btn-sm">
                                Удалить
                            </button>

                        </form>

                    </td>

                </tr>


                <!-- пустая корзина -->

                <tr th:if="${cart.items == null or #lists.isEmpty(cart.items)}">

                    <td colspan="5" class="text-center py-5 text-muted">

                        <h5 class="mb-2">Корзина пуста</h5>

                        <a href="/list" class="btn btn-primary btn-sm">
                            Перейти в каталог
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>


        <!-- итог -->

        <div class="card-footer d-flex justify-content-between align-items-center">

            <h5 class="mb-0">

                Итого:

                <strong th:text="${totalPrice} + ' ₽'">
                    0 ₽
                </strong>

            </h5>


            <div>

                <a href="/list" class="btn btn-outline-secondary me-2">
                    Продолжить покупки
                </a>

                <form th:action="@{/cart/checkout}"
                      method="post"
                      style="display:inline">

                    <button class="btn btn-success"
                            th:disabled="${cart.items == null or #lists.isEmpty(cart.items)}">

                        Оформить заказ

                    </button>

                </form>

            </div>

        </div>

    </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
