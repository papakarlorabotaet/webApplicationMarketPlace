<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Настройки профиля</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .avatar-preview{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MARKETPLACE</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">⚙ Настройки профиля</h2>

    <div class="row">

        <!-- Аватар -->
        <div class="col-md-4">

            <div class="card shadow-sm mb-4">
                <div class="card-header fw-bold">
                    Аватар
                </div>

                <div class="card-body text-center">

                    <img
                            th:src="${user.avatarPath != null ?
                            '/uploads/' + user.avatarPath :
                            'https://via.placeholder.com/120'}"
                            class="avatar-preview mb-3"
                            alt="avatar">

                    <form th:action="@{/settings/avatar}" method="post" enctype="multipart/form-data">

                        <input type="file"
                               name="avatar"
                               class="form-control mb-2"
                               accept="image/*"
                               required>

                        <button class="btn btn-primary w-100">
                            Загрузить аватар
                        </button>

                    </form>

                </div>
            </div>

        </div>


        <div class="col-md-8">

            <!-- EMAIL (только consumer/seller) -->
            <div sec:authorize="hasAnyRole('CONSUMER','SELLER')">

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">
                        Смена email
                    </div>

                    <div class="card-body">

                        <form th:action="@{/settings/email}" method="post">

                            <div class="mb-3">
                                <label class="form-label">Новый email</label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       th:value="${user.email}"
                                       required>
                            </div>

                            <button class="btn btn-success">
                                Сохранить email
                            </button>

                        </form>

                    </div>
                </div>

            </div>


            <!-- PASSWORD (только consumer/seller) -->
            <div sec:authorize="hasAnyRole('CONSUMER','SELLER')">

                <div class="card shadow-sm">

                    <div class="card-header fw-bold">
                        Смена пароля
                    </div>

                    <div class="card-body">

                        <form th:action="@{/settings/password}" method="post">

                            <div class="mb-3">
                                <label class="form-label">Текущий пароль</label>
                                <input type="password"
                                       name="oldPassword"
                                       class="form-control"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Новый пароль</label>
                                <input type="password"
                                       name="newPassword"
                                       class="form-control"
                                       required>
                            </div>

                            <button class="btn btn-warning">
                                Сменить пароль
                            </button>

                        </form>

                    </div>
                </div>

            </div>

            <!-- SUPPORT сообщение -->
            <div sec:authorize="hasRole('SUPPORT')" class="alert alert-info">
                Модераторы могут менять только аватар профиля.
            </div>

        </div>

    </div>

</div>

</body>
</html>
