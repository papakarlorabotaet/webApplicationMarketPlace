<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Электронный чек</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .receipt-card { max-width: 500px; margin: 50px auto; border: 2px dashed #ccc; }
    </style>
</head>
<body class="bg-light">
<div class="card receipt-card shadow-sm">
    <div class="card-body text-center">
        <h2 class="fw-bold">MARKETPLACE</h2>
        <p class="text-muted">Электронный кассовый чек</p>
        <hr>
        <div class="d-flex justify-content-between mb-2">
            <span>Заказ №:</span>
            <span class="fw-bold" th:text="${order.id}">123</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span>Дата:</span>
            <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">Дата</span>
        </div>
        <hr>
        <div th:each="item : ${order.items}" class="d-flex justify-content-between">
            <span th:text="${item.goods.name} + ' x' + ${item.quantity}">Товар</span>
            <span th:text="${item.goods.price} + ' ₽'">0 ₽</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="fw-bold">ИТОГО:</h4>
            <h4 class="fw-bold text-success" th:text="${order.totalPrice} + ' ₽'">0 ₽</h4>
        </div>
        <p class="mt-4 small text-muted">Спасибо за покупку!</p>
        <div class="d-grid gap-2 no-print">
            <button onclick="window.print()" class="btn btn-outline-dark">Печать чека</button>
            <a th:href="@{/list}" class="btn btn-primary">Вернуться в каталог</a>
        </div>
    </div>
</div>
</body>
</html>
