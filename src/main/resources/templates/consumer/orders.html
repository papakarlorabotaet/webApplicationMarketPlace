<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Мои заказы | MarketPlace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">MarketPlace</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/list}">Каталог</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/shops}">Магазины</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/consumer/orders}">Заказы</a></li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/messages}">
                        Сообщения
                        <span class="badge bg-secondary" th:text="${unreadMessagesCount} ?: 0">0</span>
                    </a>
                </li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart}">Корзина</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/consumer/profile}">Мой профиль</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link text-danger" th:href="@{/logout}">Выйти</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Мои заказы</h2>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${not #lists.isEmpty(orders)}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Дата заказа</th>
                        <th>Товар</th>
                        <th>Количество</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">01.01.2026</td>
                        <td class="fw-bold text-primary" th:text="${order.goods.name}">Название товара</td>
                        <td th:text="${order.quantity} + ' шт.'">1 шт.</td>
                        <td th:text="${order.totalPrice} + ' ₽'">1000 ₽</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${order.status == 'CREATED' ? 'bg-primary' : (order.status == 'Оплачен' ? 'bg-success' : 'bg-secondary')}"
                                  th:text="${order.status}">Оплачен
                            </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
