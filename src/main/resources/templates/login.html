<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header bg-dark text-white text-center">
                    <h3 class="font-weight-light my-2">Вход</h3>
                </div>
                <div th:if="${param.registered}" class="alert alert-success text-center">
                    Регистрация прошла успешно! Теперь вы можете войти.
                </div>
                <div class="card-body p-5">

                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Неверный Email или пароль.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        Вы успешно вышли из системы.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="email" name="username" placeholder="name@example.com" required>
                            <label for="email">Email адрес</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Пароль" required>
                            <label for="password">Пароль</label>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-lg" type="submit">Войти</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3 bg-white">
                    <div class="small">
                        <a th:href="@{/register/consumer}">Нет аккаунта? Зарегистрируйтесь!</a><br>
                        <a class="text-muted" th:href="@{/register/seller}">Стать продавцом</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
